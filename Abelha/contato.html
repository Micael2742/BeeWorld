        <p style="text-align: center; margin-bottom: 2rem;">Quer saber como apoiar os apicultores locais ou tirar dúvidas? Envie uma mensagem!</p>

        <form action="#" method="POST" onsubmit="alert('Mensagem enviada com sucesso! (Simulação)'); return false;">
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" required placeholder="Seu nome">
            </div>
            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" rows="5" required placeholder="Como podemos ajudar as abelhas hoje?"></textarea>
            </div>
            <button type="submit">Enviar Zunido 🚀</button>
        </form>
